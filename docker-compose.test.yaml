services:
  prometheus:
    image: prom/prometheus:latest
    container_name: sre-agent-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus-test.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: sre-agent-node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: sre-agent-alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped
