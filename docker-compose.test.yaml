##############################################################################
# SRE Agent — End-to-end test stack (memory-leak scenario)
#
# Scenario:
#   memory-leak-app slowly fills its cgroup memory toward ~86% of the
#   container's 256 MiB limit, then holds. Once working_set / spec_limit
#   > 0.80 for 1 minute, Prometheus fires ContainerMemoryPressure (severity:
#   critical). The 0.80 threshold (rather than e.g. 0.95) keeps the demo
#   reliable: pushing the daemon closer to the cgroup limit risks an OOM-kill
#   before we ever observe the alert. 80%/1m is also a realistic operational
#   warning level — 95% is typically already too late to remediate gracefully.
#   Alertmanager POSTs the alert to `sre-agent serve` running on the host
#   (host.docker.internal:8080), which runs the full pipeline:
#
#     intake → analyzer → orchestrator → runbook_matcher_agent
#                                          ↳ matches memory-leak-restart
#                                          ↳ approval link → SSH → docker restart
#
# Usage:
#   docker compose -f docker-compose.test.yaml up -d
#
#   # In another terminal:
#   sre-agent serve --port 8080
#
#   # Watch the leak climb (~3 minutes to cross 95%):
#   docker logs -f sre-memory-leak-app
#
# Manual reset (if you want to re-trigger without waiting):
#   docker restart sre-memory-leak-app
#
# Runbook executed by the approval pipeline:
#   src/sre_agent/runbooks/memory-leak-restart.md
#   src/sre_agent/runbooks/scripts/restart-memory-leak-app.sh
#
# SSH for the approval pipeline: settings.ssh.hosts must include a host
# (typically the local Docker host) where the approval handler can pipe
# the script via `ssh ... bash -s`. The approving SSH user needs `docker`
# permission for `docker restart sre-memory-leak-app`.
#
# Minimum resources: ~1.5 GB RAM is enough for this stack.
##############################################################################

services:

  # =========================================================================
  # Monitoring (Prometheus + Alertmanager + cAdvisor)
  # =========================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: sre-prometheus
    ports:
      - "9090:9090"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/alert-rules.yml << 'RULES'
        groups:
          - name: sre-agent-test
            rules:
              # Match by Docker label sre_test_role and/or compose service name.
              # Note: do not use container!="" — Docker/cAdvisor often exposes
              # an empty `container` label for the root cgroup.
              - alert: ContainerMemoryPressure
                expr: |
                  max(
                    container_memory_working_set_bytes{container_label_sre_test_role="memory-leak",container!="POD",image!=""}
                    or
                    container_memory_working_set_bytes{container_label_com_docker_compose_service="memory-leak-app",container!="POD",image!=""}
                  )
                  /
                  clamp_min(
                    min(
                      container_spec_memory_limit_bytes{container_label_sre_test_role="memory-leak",container!="POD",image!=""}
                      or
                      container_spec_memory_limit_bytes{container_label_com_docker_compose_service="memory-leak-app",container!="POD",image!=""}
                    ),
                    1
                  )
                  > 0.80
                for: 1m
                labels:
                  severity: critical
                  service: memory-leak-app
                  container: sre-memory-leak-app
                  container_label_sre_test_role: memory-leak
                  container_label_com_docker_compose_service: memory-leak-app
                annotations:
                  summary: "memory-leak-app container memory > 80% of limit for 1m"
                  description: |
                    Container sre-memory-leak-app working set has exceeded 80% of its
                    cgroup memory limit (256 MiB) for 1 minute. The application is a
                    known periodic memory-leaker — the development team is still
                    iterating on a fix, so the standard remediation is to restart the
                    container per runbook memory-leak-restart. Host node is healthy;
                    only the single container is affected.
              - alert: CadvisorDown
                expr: up{job="cadvisor"} == 0
                for: 30s
                labels:
                  severity: critical
                annotations:
                  summary: "cAdvisor scrape target is down"
        RULES
        cat > /tmp/prometheus.yml << 'PROM'
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
        rule_files:
          - /tmp/alert-rules.yml
        alerting:
          alertmanagers:
            - static_configs:
                - targets: ["alertmanager:9093"]
        scrape_configs:
          - job_name: prometheus
            static_configs:
              - targets: ["localhost:9090"]
          - job_name: cadvisor
            metrics_path: /metrics
            static_configs:
              - targets: ["cadvisor:8080"]
        PROM
        /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.retention.time=7d
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: sre-alertmanager
    ports:
      - "9093:9093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/alertmanager.yml << 'AM'
        global:
          resolve_timeout: 5m
        route:
          receiver: webhook
          group_wait: 10s
          group_interval: 30s
          repeat_interval: 1h
        receivers:
          - name: webhook
            webhook_configs:
              - url: "http://host.docker.internal:8080/webhook/alertmanager"
                send_resolved: true
        AM
        /bin/alertmanager --config.file=/tmp/alertmanager.yml
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: sre-cadvisor
    privileged: true
    ports:
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  # =========================================================================
  # Memory-leak workload (cgroup limit → slow fill toward ~96%)
  # =========================================================================

  memory-leak-app:
    image: python:3.12-alpine
    container_name: sre-memory-leak-app
    labels:
      sre_test_role: memory-leak
    volumes:
      - ./configs/memory-leak-daemon.py:/memory-leak-daemon.py:ro
    command: ["python3", "-u", "/memory-leak-daemon.py"]
    environment:
      # Heap target as a fraction of the cgroup limit. With ~25 MiB of
      # interpreter RSS on top of a 256 MiB limit, 0.86 puts working_set
      # comfortably above the 0.95 alert threshold.
      MEMORY_LEAK_TARGET_RATIO: "0.86"
      MEMORY_LEAK_CHUNK_BYTES: "3145728"
      MEMORY_LEAK_STEP_SLEEP: "1"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    restart: unless-stopped
