anthropic:
  # base_url을 환경변수 ANTHROPIC_BASE_URL로 오버라이드 가능
  # 사내 프록시 사용 시: export ANTHROPIC_BASE_URL="https://your-proxy.com/v1"
  base_url: "https://api.anthropic.com"
  model_id: "claude-sonnet-4-20250514"
  max_tokens: 4096

prometheus:
  url: "http://localhost:9090"
  alertmanager_url: "http://localhost:9093"
  default_step: "60s"
  baseline_window_hours: 24

elasticsearch:
  url: "http://localhost:9200"
  default_index: "app-logs-*"
  max_results: 500

ssh:
  timeout_seconds: 10
  hosts: []
  # docker-compose.test.yaml + memory-leak-restart 런북 승인 실행 테스트:
  # 호스트에서 Docker를 쓰므로 SSH 대상을 로컬(또는 Docker 데몬이 있는 머신)로 두고
  # runbooks/scripts/restart-memory-leak-app.sh 가 `docker restart` 할 수 있게 한다.
  # hosts:
  #   - name: "docker-host"
  #     hostname: "127.0.0.1"
  #     port: 22
  #     username: "<your-linux_user>"
  #     key_path: "~/.ssh/id_ed25519"
  # 실제 SSH 대상 추가 예시:
  # hosts:
  #   - name: "app-server-1"
  #     hostname: "10.0.1.10"
  #     port: 22
  #     username: "sre-readonly"
  #     key_path: "~/.ssh/sre_readonly_key"

servicenow:
  instance_url: ""

# HMG-APM (Scouter 기반 APM)
hmg_apm:
  url: ""              # 예: "http://scouter-server:6180"
  api_key: ""
  timeout_seconds: 30
  # 인증은 환경변수로 설정:
  # export SERVICENOW_API_TOKEN="your-token"
  # 또는
  # export SERVICENOW_USERNAME="admin"
  # export SERVICENOW_PASSWORD="password"

# 파이프라인: 알림 → Teams 전달 + 승인 링크 렌더링
delivery:
  teams_webhook_url: ""          # 비워두면 Teams 카드가 서버 로그로만 출력됨
  # 승인/상세 링크에 들어갈 외부 공개 호스트.
  # 비워두면 카드 안의 링크가 "/approve/<id>" 처럼 호스트 없이 찍혀서
  # 클릭 시 동작하지 않으므로, 로컬 테스트에서는 반드시 채우자.
  public_base_url: "http://localhost:8080"

mcp_servers:
  prometheus:
    transport: "stdio"
  elasticsearch:
    transport: "stdio"
  ssh:
    transport: "stdio"
  servicenow_cmdb:
    transport: "stdio"
