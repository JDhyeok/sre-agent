# OpenTelemetry Collector — 폐쇄망 설정
# Agent 모드: 각 서버에서 Tetragon 이벤트를 받아 중앙 서버의 FastAPI로 전달
#
# 중앙 서버의 POST /ingest/events 엔드포인트로 직접 전송 (NATS 불필요)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 100

  filter:
    logs:
      exclude:
        match_type: regexp
        bodies:
          - ".*127\\.0\\.0\\.1.*"
          - ".*::1.*"

exporters:
  # 중앙 서버의 FastAPI endpoint로 직접 전송
  otlphttp:
    endpoint: http://sre-agent-central:8000/ingest/events
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s

  debug:
    verbosity: basic

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [filter, batch]
      exporters: [otlphttp]
