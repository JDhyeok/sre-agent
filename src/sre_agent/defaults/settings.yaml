anthropic:
  # base_url을 환경변수 ANTHROPIC_BASE_URL로 오버라이드 가능
  # 사내 프록시 사용 시: export ANTHROPIC_BASE_URL="https://your-proxy.com/v1"
  base_url: "https://api.anthropic.com"
  model_id: "claude-sonnet-4-20250514"
  max_tokens: 4096

# 에이전트별 max_tokens 설정 (0이면 anthropic.max_tokens 사용)
agent_tokens:
  orchestrator: 8192    # 최종 리포트 종합 — 긴 출력 필요
  data_collector: 4096  # 도구 호출 위주 — 기본값 충분
  ssh: 2048             # 명령어 실행/결과 전달 — 짧은 출력
  rca: 8192             # 5-Phase 추론 — 긴 분석 출력
  solution: 4096        # 조치 방안 제안

prometheus:
  url: "http://localhost:9090"
  alertmanager_url: "http://localhost:9093"
  default_step: "60s"
  baseline_window_hours: 24

elasticsearch:
  url: "http://localhost:9200"
  default_index: "app-logs-*"
  max_results: 500

ssh:
  timeout_seconds: 10
  hosts: []
  # 실제 SSH 대상 추가 예시:
  # hosts:
  #   - name: "app-server-1"
  #     hostname: "10.0.1.10"
  #     port: 22
  #     username: "sre-readonly"
  #     key_path: "~/.ssh/sre_readonly_key"

servicenow:
  instance_url: ""

# 파이프라인: 알림 수신 설정
intake:
  dedup_window_minutes: 5        # 동일 알림 중복 제거 윈도우
  group_window_seconds: 60       # 연관 알림 그룹핑 윈도우
  severity_routing:
    critical: "full_analysis"    # 4 agents 전부
    warning: "lightweight"       # data_collector만 (이상시 승격)
    info: "log_only"             # 로그 기록만
    resolved: "summary_only"     # 요약만

# 파이프라인: Teams 전달 설정
delivery:
  teams_webhook_url: ""          # Microsoft Teams Incoming Webhook URL

# Ansible AWX/Tower 연동
awx:
  url: ""                        # AWX API URL (e.g. https://awx.example.com)
  token: ""                      # AWX Personal Access Token

mcp_servers:
  prometheus:
    transport: "stdio"
  elasticsearch:
    transport: "stdio"
  ssh:
    transport: "stdio"
  servicenow_cmdb:
    transport: "stdio"
  awx:
    transport: "stdio"
